databaseChangeLog:
  - changeSet:
      id: 001-create-table-book
      author: robin.kilbertus
      changes:
        - createTable:
            tableName: book
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: author
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
